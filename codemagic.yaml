workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sports.ulama.nacional

      vars:
        XCODE_PROJECT: "UlamaNacional.xcodeproj"
        XCODE_SCHEME: "UlamaNacional"

    scripts:
      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
