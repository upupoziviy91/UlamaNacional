workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: "UlamaNacional.xcodeproj"
        XCODE_SCHEME: "UlamaNacional"
        BUNDLE_ID: "com.sports.ulama.nacional"

    scripts:
      - name: Show Xcode version
        script: xcodebuild -version

      - name: List schemes
        script: |
          xcodebuild -list -project "$XCODE_PROJECT"

      - name: Build project check
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination 'generic/platform=iOS Simulator'
    artifacts:
      - /tmp/xcodebuild_logs/*.log
